<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chicago Crime Analysis{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>chicago_crime.db</h1>
            <nav>
                <a href="/" class="{% block nav_home %}{% endblock %}">Home</a>
                <a href="/data-exploration" class="{% block nav_overview %}{% endblock %}">Data</a>
                <a href="/method" class="{% block nav_method %}{% endblock %}">Method</a>
                <a href="/dashboards/algorithm" class="{% block nav_algorithm %}{% endblock %}">Algorithm</a>
                <a href="/about" class="{% block nav_about %}{% endblock %}">About</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            Hertie School · Data Structures & Algorithms · 2026
        </footer>
    </div>
</body>
</html>
