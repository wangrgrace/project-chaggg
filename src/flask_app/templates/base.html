<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chicago Crime Analysis{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1419;
            --bg-card: #1a2332;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
        }
        header h1 span {
            color: var(--accent);
        }
        nav {
            margin-top: 1rem;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--accent);
        }
        main h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }
        main p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            background: var(--bg-card);
            color: var(--text);
        }
        ul.link-list {
            list-style: none;
        }
        ul.link-list li {
            margin-bottom: 0.75rem;
        }
        ul.link-list a {
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        ul.link-list a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>Chicago <span>Crime</span> Analysis</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/dashboards/time">Dashboards</a>
                <a href="/viz/placeholder">Visualizations</a>
                <a href="/dashboards/algorithm">Algorithm</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            Hertie School · Data Structures & Algorithms · 2026
        </footer>
    </div>
</body>
</html>
