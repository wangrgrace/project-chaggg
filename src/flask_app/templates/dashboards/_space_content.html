{# Partial: spatial dashboard content. Used by dashboards/space.html and the merged dashboards page. #}

<style>
  .map-wrapper {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    position: relative;
    height: 75vh;
    margin-top: 1rem;
    margin-bottom: 1.5rem;
  }
  #map { height: 100%; width: 100%; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .year-control {
    position: absolute; top: 10px; right: 10px;
    background: rgba(20, 30, 40, 0.92);
    border: 1px solid rgba(90, 155, 110, 0.3);
    padding: 12px 16px;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #e6edf3;
    z-index: 1000;
    width: 320px;
  }
  .year-control label {
    display: block;
    text-align: center;
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #5a9b6e;
  }
  .year-control #yearValue {
    color: #a0ff8c;
    font-size: 15px;
    font-weight: 700;
    margin-left: 4px;
  }
  .year-control input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(90, 155, 110, 0.25);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .year-control input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #5a9b6e;
    border: 2px solid #a0ff8c;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(160, 255, 140, 0.5);
    transition: transform 0.15s;
  }
  .year-control input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
  .year-control input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #5a9b6e;
    border: 2px solid #a0ff8c;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(160, 255, 140, 0.5);
  }
  .legend {
    background: rgba(20, 30, 40, 0.92);
    border: 1px solid rgba(90, 155, 110, 0.3);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #e6edf3;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
  }
  .legend h4 {
    margin: 0 0 8px;
    color: #5a9b6e;
    font-size: 13px;
    letter-spacing: 0.15em;
    font-weight: 700;
  }
  .legend i {
    display: inline-block;
    width: 18px;
    height: 10px;
    margin-right: 6px;
    border-radius: 2px;
  }
  .leaflet-popup-content-wrapper { background: #1a2332; color: #e2e8f0; border-radius: 6px; }
  .leaflet-popup-tip { background: #1a2332; }
  .leaflet-popup-content { font-family: 'DM Sans', sans-serif; }
  .leaflet-popup-content hr { border-color: #334155; }
  .cluster-mark {
      background: rgba(20, 30, 40, 0.85);
      border: 2px solid #5a9b6e;
      border-radius: 50%;
      width: 40px !important;
      height: 40px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.02em;
      box-shadow: 0 0 8px rgba(90, 155, 110, 0.4);
    }
    .cluster-mark span {
      line-height: 1;
    }
    .cluster-mark div {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
</style>

<div class="map-wrapper">
  <div id="map"></div>
  <div class="year-control">
    <label>Year: <span id="yearValue">2002</span></label>
    <input type="range" id="yearSlider" min="2002" max="2025" value="2002" step="1">
  </div>
</div>

<script>
(function() {
  const map = L.map('map').setView([41.8781, -87.6298], 11);
  map.createPane('labels');
  map.getPane('labels').style.zIndex = 650;
  map.getPane('labels').style.pointerEvents = 'none';

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, pane: 'labels'
  }).addTo(map);

  let clusterLayer, heatLayer, boundaryLayer;
  let pointsByYear = {}, statsByYear = {}, geojsonData = null;

  function renderYear(year) {
    if (clusterLayer) map.removeLayer(clusterLayer);
    if (heatLayer) map.removeLayer(heatLayer);
    if (boundaryLayer) map.removeLayer(boundaryLayer);

    const points = pointsByYear[year] || [];
    const stats = statsByYear[year] || {};

    clusterLayer = L.markerClusterGroup({
      iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        return L.divIcon({
          html: '<div><span>' + count + '</span></div>',
          className: 'cluster-mark',
          iconSize: L.point(40, 40)
        });
      }
    });;
    points.forEach(([lat, lon, type]) => {
      const m = L.circleMarker([lat, lon], { radius: 3, color: '#e74c3c', fillOpacity: 0.6, weight: 0 });
      m.bindPopup(type);
      clusterLayer.addLayer(m);
    });
    map.addLayer(clusterLayer);

    const heatData = points.map(([lat, lon]) => [lat, lon, 0.4]);
    heatLayer = L.heatLayer(heatData, {
      radius: 8, blur: 4, maxZoom: 15, minOpacity: 0.05, max: 0.5,
      gradient: {
        0.0:  'rgba(20, 60, 35, 0)',       // transparent dark green
        0.15: 'rgba(20, 60, 35, 0.6)',     // dark forest green (low)
        0.35: 'rgba(30, 100, 50, 0.7)',    // deep green
        0.55: 'rgba(50, 150, 70, 0.8)',    // medium green
        0.75: 'rgba(90, 200, 100, 0.88)',  // bright green
        1.0:  'rgba(160, 255, 140, 0.95)'  // luminous pale green (peak)
      }
    }).addTo(map);

    boundaryLayer = L.geoJSON(geojsonData, {
      style: { color: 'rgba(148,163,184,0.5)', weight: 1.2, fillOpacity: 0.01, opacity: 0.7 },
      onEachFeature: (feature, layer) => {
        const areaNum = feature.properties.area_numbe;
        const name = feature.properties.community;
        const s = stats[areaNum];
        if (s) {
          const top3 = s.top3.map(([t, c]) => `<li>${t}: ${c.toLocaleString()}</li>`).join('');
          layer.bindPopup(`
            <div style="min-width:180px">
              <strong style="font-size:14px;color:#3b82f6">${name}</strong><br>
              <span>Year ${year} Total: ${s.total.toLocaleString()}</span>
              <hr style="margin:4px 0">
              <strong>Top 3 Types:</strong>
              <ol style="margin:4px 0 0 16px;padding:0">${top3}</ol>
            </div>`);
        }
        layer.on('mouseover', () => { layer.setStyle({ weight: 2.5, color: '#3b82f6', fillOpacity: 0.08 }); layer.bringToFront(); });
        layer.on('mouseout', () => boundaryLayer.resetStyle(layer));
      }
    }).addTo(map);

    boundaryLayer.bringToFront();
  }

  Promise.all([
    fetch('/static/data/space/sampled_points_by_year.json').then(r => r.json()),
    fetch('/static/data/space/community_stats_by_year.json').then(r => r.json()),
    fetch('/static/data/space/chicago_community_areas.geojson').then(r => r.json())
  ]).then(([pts, stats, geo]) => {
    pointsByYear = pts; statsByYear = stats; geojsonData = geo;
    renderYear('2002');

    const slider = document.getElementById('yearSlider');
    const label = document.getElementById('yearValue');
    slider.addEventListener('input', (e) => {
      const y = e.target.value;
      label.textContent = y;
      renderYear(y);
    });

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `<h4>// Crime Density</h4>
        <div><i style="background:#143c23"></i>Low</div>
        <div><i style="background:#1e6432"></i>Mid-Low</div>
        <div><i style="background:#329646"></i>Mid</div>
        <div><i style="background:#5ac864"></i>High</div>
        <div><i style="background:#a0ff8c"></i>Peak</div>`;
      return div;
    };
    legend.addTo(map);
  });
})();
</script>
